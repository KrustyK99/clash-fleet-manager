# Phase 4C Synology Docker production-candidate real-data example.
#
# This file is a template only. Do not use it until the real production JSON
# folder has been identified, backed up, verified, and explicitly approved for
# mounting read/write into the container. Do not use this file for production-copy rehearsals.
#
# This does not change the existing Web Station/PHP production URL. It exposes
# the FastAPI JSON candidate on a separate LAN-only host port, normally 8004 when 8003 is still used by the production-copy rehearsal.

services:
  fastapi-json-prod-candidate:
    image: clash-fleet-manager-fastapi-json:local
    container_name: clash-fleet-manager-fastapi-json-production-candidate
    ports:
      - "8004:8001"
    environment:
      FLEET_STORE_BACKEND: json
      FLEET_DATA_DIR: /data
      FLEET_SERVE_APP: "1"
      FLEET_APP_DIR: /app
    volumes:
      # Replace this with the confirmed production JSON folder only after backup.
      # Example shape only:
      # Confirmed Phase 4C-C live production JSON folder:
      - /volume1/web/clash-timers/data:/data
    restart: "no"
